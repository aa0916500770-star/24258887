<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>菜單管理</title><link rel="stylesheet" href="assets/styles.css"></head><body>
<div class="admin-layout"><aside class="sidebar"><h2>餐廳後台</h2><a href="admin.html">訂單看板</a><a class="active" href="menu.html">菜單管理</a><a href="qrcode.html">桌號 QR</a><a href="index.html?table=A01">顧客頁</a></aside><main class="admin-main"><section class="panel"><h1>菜單管理</h1><p>可新增、刪除餐點，資料會儲存在瀏覽器 localStorage。</p><div class="row"><input id="restaurantName" placeholder="餐廳名稱"><button class="primary" onclick="saveName()">儲存餐廳名稱</button></div></section><section class="panel"><h2>新增餐點</h2><div style="display:grid;gap:10px"><input id="foodName" placeholder="餐點名稱"><input id="category" placeholder="分類，例如：主餐、小菜、飲品"><input id="price" type="number" placeholder="價格"><input id="icon" placeholder="圖示 Emoji，例如 🍜（沒有照片時顯示）"><input id="photo" type="file" accept="image/*"><div id="photoPreview" class="photo-preview">尚未選擇餐點照片</div><input id="desc" placeholder="餐點描述"><button class="primary" onclick="addMenu()">新增</button></div></section><section class="panel"><h2>目前菜單</h2><table class="table"><thead><tr><th>照片</th><th>分類</th><th>餐點</th><th>價格</th><th>操作</th></tr></thead><tbody id="rows"></tbody></table></section></main></div><script src="assets/menu.js"></script></body></html>

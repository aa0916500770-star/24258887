<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>雲端桌號 QR</title><link rel="stylesheet" href="assets/style.css"></head><body><header class="top"><div class="brand">雲端桌號 QR Code</div><nav class="nav"><a class="secondary" href="admin.html">後台</a><button class="btn" onclick="print()">列印</button></nav></header><main class="wrap"><section class="card no-print"><h2>產生桌號 QR</h2><div class="row"><input id="base" placeholder="點餐網址"><input id="count" type="number" min="1" placeholder="桌數"><button class="btn" id="gen">產生</button></div><p class="muted">部署到 GitHub Pages 後，請用正式網址產生再列印。</p></section><section class="grid" id="list"></section></main><script type="module">import{requireAdmin,getDoc,paths,esc}from'./assets/firebase-app.js';await requireAdmin();let name='餐廳',tables=20;try{const s=await getDoc(paths.restaurant());if(s.exists()){name=s.data().name||name;tables=s.data().tables||tables}}catch(e){}base.value=location.href.replace('qrcode.html','order.html').split('?')[0];count.value=tables;gen.onclick=render;function render(){const b=base.value.trim(),n=Number(count.value)||20;list.innerHTML=Array.from({length:n},(_,i)=>{const t=i+1,u=b+'?table='+encodeURIComponent(t),qr='https://api.qrserver.com/v1/create-qr-code/?size=220x220&data='+encodeURIComponent(u);return`<div class="card qr"><h2>${esc(name)}｜${t} 桌</h2><img src="${qr}"><p>掃碼點餐</p><small>${esc(u)}</small></div>`}).join('')}render();</script></body></html>

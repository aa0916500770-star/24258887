<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>桌號 QR Code</title><link rel="stylesheet" href="assets/styles.css"></head><body><header class="topbar"><div class="brand">桌號 QR Code</div><nav class="nav"><a class="secondary" href="admin.html">後台</a><button class="btn" onclick="window.print()">列印 QR</button></nav></header><main class="wrap"><div class="card no-print"><h2>產生桌號 QR</h2><p class="muted">上傳 GitHub Pages 後，請確認網址是正式網址，再列印 QR Code。</p><div class="row"><input id="baseUrl" placeholder="點餐網址"><input id="count" type="number" min="1"><button class="btn" onclick="renderQR()">重新產生</button></div></div><div class="grid" id="qrList"></div></main><script src="assets/app.js"></script><script>if(!ensureAdmin()) throw new Error('no auth'); const d=loadData(); baseUrl.value=location.href.replace('qrcode.html','order.html').split('?')[0]; count.value=d.restaurant.tables||20; function renderQR(){const base=baseUrl.value.trim(); const n=Number(count.value)||20; qrList.innerHTML=Array.from({length:n},(_,i)=>{const t=i+1; const url=base+'?table='+encodeURIComponent(t); const qr='https://api.qrserver.com/v1/create-qr-code/?size=220x220&data='+encodeURIComponent(url); return `<div class="card qrbox"><h2>${esc(d.restaurant.name)}｜${t} 桌</h2><img src="${qr}" alt="QR"><p class="muted">掃碼點餐</p><small>${esc(url)}</small></div>`}).join('')} renderQR();</script></body></html>

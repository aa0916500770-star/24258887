<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>後台登入</title><link rel="stylesheet" href="assets/style.css"></head><body><main class="wrap" style="max-width:520px"><section class="card"><h1>管理員登入</h1><p class="muted">請使用 Firebase Authentication 建立的 Email/Password 帳號登入。</p><div class="form"><input id="email" type="email" placeholder="Email"><input id="password" type="password" placeholder="密碼"><button class="btn" id="loginBtn">登入</button><a class="btn secondary" href="index.html">返回首頁</a></div><p id="msg" class="muted"></p></section></main><script type="module">import{auth,signInWithEmailAndPassword}from'./assets/firebase-app.js';loginBtn.onclick=async()=>{try{await signInWithEmailAndPassword(auth,email.value.trim(),password.value);location.href=new URLSearchParams(location.search).get('next')||'admin.html'}catch(e){msg.textContent='登入失敗：請確認帳號密碼與 Firebase 設定。'}};</script></body></html>

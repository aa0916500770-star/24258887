<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>顧客點餐</title><link rel="stylesheet" href="assets/styles.css"></head><body><header class="topbar"><div><div class="brand" id="brand"></div><div class="muted">桌號：<b id="tableText"></b></div></div><nav class="nav"><a class="secondary" href="index.html">首頁</a></nav></header><main class="wrap"><div class="card" id="tableAsk"><h2>請輸入桌號</h2><div class="row"><input id="tableInput" placeholder="例如：1、A01、包廂2"><button class="btn" onclick="setTableNow()">開始點餐</button></div></div><div class="tabs" id="cats"></div><div class="grid" id="menuList"></div></main><div class="cart"><div class="cart-inner"><div><b>購物車：</b><span id="cartCount">0</span> 項　<span class="price" id="cartTotal">NT$ 0</span></div><button class="btn" onclick="openCart()">查看 / 送出訂單</button></div></div><dialog id="cartDialog" style="border:0;border-radius:20px;max-width:680px;width:92%;padding:0"><div class="card"><h2>確認訂單</h2><div id="cartItems"></div><div class="form"><label>用餐方式<select id="dineType"><option>內用</option><option>外帶</option></select></label><label>訂單備註<textarea id="orderNote" placeholder="例如：不要蔥、餐後再上甜點"></textarea></label></div><div class="row" style="justify-content:space-between;margin-top:14px"><button class="btn secondary" onclick="cartDialog.close()">返回</button><button class="btn ok" onclick="submitOrder()">送出訂單</button></div></div></dialog><script src="assets/app.js"></script><script src="assets/order.js"></script></body></html>

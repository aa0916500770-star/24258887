<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>顧客點餐</title><link rel="stylesheet" href="assets/style.css"></head><body><header class="top"><div><div class="brand" id="rname">載入中...</div><div class="muted">桌號：<b id="tableTxt"></b></div></div><nav class="nav"><a class="secondary" href="index.html">首頁</a></nav></header><main class="wrap"><section class="card" id="ask"><h2>請輸入桌號</h2><div class="row"><input id="tableInput" placeholder="例如 1、A01、包廂2"><button class="btn" id="startBtn">開始點餐</button></div></section><div class="tabs" id="tabs"></div><div class="grid" id="menu"></div></main><div class="cart"><div class="cart-inner"><div><b>購物車：</b><span id="count">0</span> 項　<span class="price" id="total">NT$ 0</span></div><button class="btn" id="cartBtn">查看 / 送出</button></div></div><dialog id="dialog"><div class="card"><h2>確認訂單</h2><div id="cartRows"></div><div class="form"><select id="dine"><option>內用</option><option>外帶</option></select><textarea id="note" placeholder="訂單備註"></textarea></div><div class="row" style="justify-content:space-between;margin-top:12px"><button class="btn secondary" onclick="dialog.close()">返回</button><button class="btn ok" id="sendBtn">送出訂單</button></div></div></dialog><script type="module" src="assets/order.js"></script></body></html>

<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>雲端後台管理</title><link rel="stylesheet" href="assets/style.css"></head><body><header class="top"><div class="brand">雲端後台管理</div><nav class="nav"><a class="secondary" href="index.html">首頁</a><a class="secondary" href="qrcode.html">桌號 QR</a><a class="secondary" href="kitchen.html">廚房</a><a class="secondary" href="cashier.html">櫃台</a><a class="secondary" href="reports.html">統計</a><button class="btn danger" id="logout">登出</button></nav></header><main class="wrap"><section class="grid"><div class="card"><h2>餐廳設定</h2><div class="form"><input id="restaurantName" placeholder="餐廳名稱"><input id="phone" placeholder="電話"><input id="address" placeholder="地址"><input id="tables" type="number" min="1" placeholder="桌數"><button class="btn" id="saveSetting">儲存設定</button></div></div><div class="card"><h2>新增 / 編輯菜色</h2><div class="form"><input id="editId" type="hidden"><input id="dish" placeholder="餐點名稱"><input id="category" placeholder="分類，例如：主餐、小菜、飲料"><input id="price" type="number" min="0" placeholder="價格"><textarea id="desc" placeholder="餐點介紹"></textarea><label>餐點照片<input id="photo" type="file" accept="image/*"></label><textarea id="options" placeholder="客製化選項，一行一組：冰量=正常冰,少冰,去冰"></textarea><label><input id="available" type="checkbox" checked> 上架販售</label><div class="row"><button class="btn" id="saveDish">儲存菜色</button><button class="btn secondary" id="clear">清空</button></div></div></div></section><section class="card" style="margin-top:16px"><h2>雲端菜單列表</h2><table class="table"><thead><tr><th>照片</th><th>餐點</th><th>分類</th><th>價格</th><th>狀態</th><th>操作</th></tr></thead><tbody id="rows"></tbody></table></section></main><script type="module" src="assets/admin.js"></script></body></html>

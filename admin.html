<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>後台管理</title><link rel="stylesheet" href="assets/styles.css"></head><body><header class="topbar"><div class="brand">後台管理</div><nav class="nav"><a class="secondary" href="index.html">首頁</a><a class="secondary" href="qrcode.html">桌號 QR</a><a class="secondary" href="reports.html">營業統計</a><a class="secondary" href="kitchen.html">廚房</a><a class="secondary" href="cashier.html">櫃台</a></nav></header><main class="wrap"><section class="grid"><div class="card"><h2>餐廳設定</h2><div class="form"><input id="restaurantName" placeholder="餐廳名稱"><input id="restaurantPhone" placeholder="電話"><input id="restaurantAddress" placeholder="地址"><input id="tableCount" type="number" min="1" placeholder="桌數"><input id="newPin" placeholder="修改後台密碼"><button class="btn" onclick="saveRestaurant()">儲存設定</button></div></div><div class="card"><h2>新增 / 修改菜色</h2><div class="form"><input type="hidden" id="editId"><input id="dishName" placeholder="餐點名稱"><input id="category" placeholder="分類，例如：主餐、小菜、飲品"><input id="price" type="number" min="0" placeholder="價格"><textarea id="desc" placeholder="餐點介紹"></textarea><label>餐點照片<input id="photo" type="file" accept="image/*"></label><textarea id="options" placeholder="客製化選項，一行一組：冰量=正常冰,少冰,去冰"></textarea><label><input id="available" type="checkbox" checked> 上架販售</label><div class="row"><button class="btn" onclick="saveDish()">儲存菜色</button><button class="btn secondary" onclick="clearForm()">清空</button></div></div></div></section><section class="card" style="margin-top:16px"><h2>菜單列表</h2><table class="table"><thead><tr><th>照片</th><th>餐點</th><th>分類</th><th>價格</th><th>狀態</th><th>操作</th></tr></thead><tbody id="menuRows"></tbody></table></section><section class="grid" style="margin-top:16px"><div class="card"><h2>資料備份</h2><p class="muted">可匯出 JSON 備份，換電腦或清除瀏覽器資料前請先備份。</p><button class="btn" onclick="exportData()">匯出備份</button><label class="btn secondary">匯入備份<input id="importFile" type="file" accept="application/json" style="display:none" onchange="importData(this.files[0])"></label></div><div class="card"><h2>危險操作</h2><button class="btn danger" onclick="clearOrders()">清除所有訂單</button><button class="btn danger" onclick="resetDemo()">恢復示範資料</button></div></section></main><script src="assets/app.js"></script><script src="assets/admin.js"></script></body></html>
